databaseChangeLog:
  - changeSet:
      id: 1781961000000-1
      author: codex
      changes:
        - addColumn:
            tableName: intake
            columns:
              - column:
                  name: created_at
                  type: DATETIME
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: DATETIME
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false
              - column:
                  name: is_deleted
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: version
                  type: BIGINT
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
        - createIndex:
            tableName: intake
            indexName: idx_intake_user_updated_at
            columns:
              - column:
                  name: user_id
              - column:
                  name: updated_at
              - column:
                  name: id
